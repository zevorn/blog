baseURL = "https://zevorn.github.io/blog/"
languageCode = "en"
defaultContentLanguage = "en"
title = "📖"                        # site title                     # 网站标题
theme = "zozo"
hasCJKLanguage = true                  # has chinese/japanese/korean ?  # 自动检测是否包含 中文\日文\韩文
summaryLength = 100
paginate = 4                           # shows the number of articles   # 首页显示文章数量
enableEmoji = true
googleAnalytics = ""                   # your google analytics id       # Google统计代码
disqusShortname = ""                   # your discuss shortname         # Disqus评论系统代码

pygmentsUseClasses = true
pygmentCodeFences = true
pygmentscodefencesguesssyntax = true


[blackfriday]
  smartypants = true

[[menu.main]]                          # config your menu               # 配置菜单
  name = " 主页"
  weight = 10
  identifier = "home"
  url = "/"
[[menu.main]]
  name = "文章"
  weight = 20
  identifier = "archive"
  url = "/posts/"
[[menu.main]]
  name = "标签"
  weight = 30
  identifier = "tags"
  url = "/tags/"
[[menu.main]]
  name = "关于我"
  weight = 40
  identifier = "about"
  url = "/about/"

[params]
  subTitle = "泽文的博客"       # site's subTitle              # 网站二级标题
  keywords = ["zevorn","hugo","blog"]        # site's keywords             # 网站关键字
  description = "zevorn's blog"              # site's description          # 网站描述
  enableMathJax = true                       # enable mathjax              # 是否使用 mathjax（数学公式）
  enableSummary = true                       # display the article summary # 是否显示文章摘要
  mainSections = ["posts"]

# Valine.
# You can get your appid and appkey from https://leancloud.cn
# more info please open https://valine.js.org
[params.valine]
  enable = false
  appId = ""
  appKey = ""
  placeholder = " "
  visitor = true

[params.author]           # essential        # 必需
  name = "zevorn"

# Your socail's url
# 社交地址配置
[social]
  github = "https://github.com/zevorn"
  bilibili = "https://space.bilibili.com/483048140"
  gitlab = "https://gitee.com/zevorn"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
  unsafe = true
